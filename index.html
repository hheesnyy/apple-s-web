<!DOCTYPE html>
<html>

<head>

    <title>Apple Mood Map</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Where u up to?</h1>
        
        <p>pick today's mood</p>

     <div class="mood-buttons">

    <button onclick="showMood('ocean')">
        🌊 Ocean
    </button>

    <button onclick="showMood('mountain')">
        ⛰ Mountain
    </button>

    <button onclick="showMood('rainy day')">
        🌧 Rainy Day
    </button>

    <button onclick="showMood('picnic')">
        🧺 Picnic
    </button>

    <button onclick="showMood('city walk')">
        🚶 City Walk
    </button>

    <button onclick="showMood('coffee date')">
        ☕ Coffee Date
    </button>

    <button onclick="showMood('nights')">
        🌙 Nights
    </button>

    <button onclick="showMood('solo trip')">
        🎒 Solo Trip
    </button>

    <button onclick="showMood('vintage')">
        👕 Vintage
    </button>

</div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
