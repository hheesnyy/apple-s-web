<!DOCTYPE html>
<html>
<head>
    <title>Apple's Archive</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="brand">
        <p>PERSONAL ARCHIVE · EST. 2026</p>
        <h1>Apple's Archive</h1>
        <h2>The world, as I remember it.</h2>
    </div>

    <nav>
        <button onclick="filterMood('all')">ALL</button>

<button onclick="filterMood('海')">OCEAN</button>

<button onclick="filterMood('山')">MOUNTAIN</button>

<button onclick="filterMood('coffee date')">COFFEE</button>

<button onclick="filterMood('nights')">NIGHTS</button>

<button onclick="filterMood('solo trip')">SOLO TRIP</button>

<button onclick="filterMood('city walk')">CITY WALK</button>

<button onclick="filterMood('vintage')">VINTAGE</button>
    </nav>
</header>

<main>
    <section id="gallery" class="gallery"></section>

    <aside id="detailPanel" class="detail-panel">
        <button class="close" onclick="closeDetail()">×</button>

        <img id="detailImage" src="" alt="memory photo">

        <p id="detailMood" class="detail-mood"></p>
        <h3 id="detailPlace"></h3>
        <p id="detailRegion"></p>

        <blockquote id="detailCaption"></blockquote>

        <p id="detailSong"></p>
        <p id="detailNearby"></p>

        <a id="detailMap" href="#" target="_blank">Open in Maps →</a>
    </aside>
</main>

<script src="script.js"></script>

</body>
</html>
